<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="The Notebook Concert" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>
      <%= EVENT_NAME %> – <%= CONCERT_THEME_NAME %> | <%= EVENT_DATES %>, <%=
      EVENT_CITY %>
    </title>
    <meta
      name="description"
      content="<%= CONCERT_DESCRIPTION %> <%= EVENT_DATES %> at <%= EVENT_VENUE %>. Book tickets now."
    />
    <meta
      name="keywords"
      content="The Notebook Concert, Jalgaon concert, 7 stages of love, live music Jalgaon, concert tickets Jalgaon, Sanam concert"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://thenotebookconcert.in/" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="<%= EVENT_NAME %> – <%= CONCERT_THEME_NAME %>"
    />
    <meta
      property="og:description"
      content="Live music concert | <%= EVENT_DATES %> | <%= EVENT_VENUE %>"
    />
    <meta
      property="og:image"
      content="https://thenotebookconcert.in/og-image.png"
    />
    <meta property="og:url" content="https://thenotebookconcert.in/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="<%= EVENT_NAME %> – <%= CONCERT_THEME_NAME %>"
    />
    <meta
      name="twitter:description"
      content="Live music concert | <%= EVENT_DATES %> | <%= EVENT_VENUE %>"
    />
    <meta
      name="twitter:image"
      content="https://thenotebookconcert.in/og-image.png"
    />

    <!-- Event Schema (rich results in Google) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MusicEvent",
        "name": "<%= EVENT_NAME %> – <%= CONCERT_THEME_NAME %>",
        "startDate": "<%= EVENT_DATETIME_START %>",
        "endDate": "<%= EVENT_DATETIME_END %>",
        "eventStatus": "https://schema.org/EventScheduled",
        "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
        "location": {
          "@type": "Place",
          "name": "Saffron Hotel",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Jalgaon",
            "addressRegion": "Maharashtra",
            "addressCountry": "IN"
          }
        },
        "image": "https://thenotebookconcert.in/og-image.png",
        "description": "<%= CONCERT_DESCRIPTION %>",
        "offers": {
          "@type": "Offer",
          "url": "https://thenotebookconcert.in/booking",
          "price": "<%= EVENT_PRICE %>",
          "priceCurrency": "INR",
          "availability": "https://schema.org/InStock",
          "validFrom": "2026-01-01"
        },
        "performer": [
          { "@type": "Person", "name": "Sanam" },
          { "@type": "Person", "name": "Rahul" }
        ],
        "organizer": {
          "@type": "Organization",
          "name": "The Notebook Concert",
          "url": "https://thenotebookconcert.in"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
